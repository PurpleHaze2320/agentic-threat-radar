<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Threat Radar | Fortis Intelligence</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0B0F19',
                        panel: '#151C2C',
                        primary: '#00E5FF',
                        danger: '#FF3366',
                        warning: '#FFB020',
                        safe: '#00D18A'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F19; color: #E2E8F0; }
        .glass-panel {
            background: rgba(21, 28, 44, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-glow { text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons using Inline SVGs for reliability in React
        const ShieldAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>;
        const Activity = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const Terminal = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>;

        // Mock data generated by the Python script
        const mockData = {
            "last_updated": "2026-05-01T12:00:00Z",
            "total_scanned": 455,
            "data": [
                {
                    "repo_name": "cyanheads/git-mcp-server",
                    "risk_score": 95,
                    "scanned_files": 142,
                    "vulnerabilities": [
                        {
                            "severity": "CRITICAL",
                            "category": "RCE",
                            "title": "Node.js OS Command Injection (CVE-2025-53107)",
                            "description": "child_process.exec found. Allows indirect prompt injection to execute OS commands.",
                            "file_path": "src/git.ts",
                            "line_number": 45
                        },
                        {
                            "severity": "HIGH",
                            "category": "Network",
                            "title": "NeighborJack Vulnerability",
                            "description": "Server bound to 0.0.0.0 without authentication.",
                            "file_path": "src/index.ts",
                            "line_number": 12
                        }
                    ]
                },
                {
                    "repo_name": "developer-x/aws-s3-mcp",
                    "risk_score": 85,
                    "scanned_files": 24,
                    "vulnerabilities": [
                        {
                            "severity": "CRITICAL",
                            "category": "RCE",
                            "title": "Python Arbitrary Shell Execution",
                            "description": "subprocess.Popen(shell=True) detected processing LLM arguments.",
                            "file_path": "server.py",
                            "line_number": 88
                        }
                    ]
                },
                {
                    "repo_name": "anthropic/sqlite-mcp-demo",
                    "risk_score": 45,
                    "scanned_files": 38,
                    "vulnerabilities": [
                        {
                            "severity": "MEDIUM",
                            "category": "Auth",
                            "title": "Static API Token Usage",
                            "description": "Found static tokens in env. Missing OAuth 2.1 compliance.",
                            "file_path": "config.py",
                            "line_number": 18
                        }
                    ]
                }
            ]
        };

        const App = () => {
            const [report, setReport] = useState(mockData);

            const getRiskColor = (score) => {
                if (score >= 80) return 'text-danger';
                if (score >= 40) return 'text-warning';
                return 'text-safe';
            };

            const getBadgeColor = (severity) => {
                if (severity === 'CRITICAL') return 'bg-danger/20 text-danger border-danger/50';
                if (severity === 'HIGH') return 'bg-orange-500/20 text-orange-400 border-orange-500/50';
                if (severity === 'MEDIUM') return 'bg-warning/20 text-warning border-warning/50';
                return 'bg-safe/20 text-safe border-safe/50';
            };

            return (
                <div className="min-h-screen p-6 font-sans">
                    {/* Header */}
                    <header className="mb-8 border-b border-gray-800 pb-6 flex justify-between items-end">
                        <div>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                <ShieldAlert className="text-primary w-8 h-8" />
                                <span className="text-glow">Agentic Threat Radar</span>
                            </h1>
                            <p className="text-gray-400 mt-2">Continuous Security Analysis of the Model Context Protocol Ecosystem</p>
                            <p className="text-xs text-gray-500 font-mono mt-1">Built by Nicolas Ray | Fortis Intelligence</p>
                        </div>
                        <div className="text-right">
                            <div className="flex items-center gap-2 text-sm text-primary bg-primary/10 px-3 py-1 rounded-full border border-primary/20">
                                <span className="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                                Live System Status: Scanning
                            </div>
                        </div>
                    </header>

                    {/* Top Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="glass-panel p-6 rounded-xl flex items-center gap-4">
                            <div className="p-4 bg-blue-500/10 rounded-lg text-blue-400 border border-blue-500/20">
                                <Activity />
                            </div>
                            <div>
                                <p className="text-sm text-gray-400 font-medium">MCP Servers Scanned</p>
                                <p className="text-3xl font-bold text-white font-mono">{report.total_scanned}</p>
                            </div>
                        </div>
                        <div className="glass-panel p-6 rounded-xl flex items-center gap-4">
                            <div className="p-4 bg-danger/10 rounded-lg text-danger border border-danger/20">
                                <ShieldAlert />
                            </div>
                            <div>
                                <p className="text-sm text-gray-400 font-medium">Critical RCE Vulnerabilities</p>
                                <p className="text-3xl font-bold text-danger font-mono">142</p>
                            </div>
                        </div>
                        <div className="glass-panel p-6 rounded-xl flex items-center gap-4">
                            <div className="p-4 bg-warning/10 rounded-lg text-warning border border-warning/20">
                                <Terminal />
                            </div>
                            <div>
                                <p className="text-sm text-gray-400 font-medium">NeighborJack Risks (0.0.0.0)</p>
                                <p className="text-3xl font-bold text-warning font-mono">89</p>
                            </div>
                        </div>
                    </div>

                    {/* Threat List */}
                    <h2 className="text-xl font-bold mb-4 text-white">Latest High-Risk Repositories</h2>
                    <div className="space-y-4">
                        {report.data.map((repo, idx) => (
                            <div key={idx} className="glass-panel rounded-xl overflow-hidden">
                                <div className="p-5 border-b border-gray-800 flex justify-between items-center bg-gray-900/30">
                                    <div className="flex items-center gap-4">
                                        <div className={`text-2xl font-bold font-mono ${getRiskColor(repo.risk_score)}`}>
                                            {repo.risk_score}
                                            <span className="text-xs text-gray-500 block text-center uppercase tracking-widest">Risk</span>
                                        </div>
                                        <div>
                                            <h3 className="text-lg font-bold text-white font-mono">{repo.repo_name}</h3>
                                            <p className="text-sm text-gray-400">{repo.scanned_files} files analyzed</p>
                                        </div>
                                    </div>
                                    <a href={`https://github.com/${repo.repo_name}`} target="_blank" className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm font-medium transition-colors border border-gray-700">
                                        View on GitHub
                                    </a>
                                </div>
                                <div className="p-5 bg-panel">
                                    <h4 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Detected Vulnerabilities</h4>
                                    <div className="space-y-3">
                                        {repo.vulnerabilities.map((vuln, vIdx) => (
                                            <div key={vIdx} className="flex flex-col md:flex-row gap-4 justify-between items-start md:items-center bg-gray-900/50 p-4 rounded-lg border border-gray-800">
                                                <div className="flex items-start gap-3">
                                                    <span className={`px-2 py-1 text-xs font-bold border rounded ${getBadgeColor(vuln.severity)}`}>
                                                        {vuln.severity}
                                                    </span>
                                                    <div>
                                                        <p className="font-semibold text-gray-200">{vuln.title}</p>
                                                        <p className="text-sm text-gray-400">{vuln.description}</p>
                                                    </div>
                                                </div>
                                                <div className="font-mono text-xs text-gray-500 bg-black/40 px-3 py-2 rounded whitespace-nowrap">
                                                    {vuln.file_path} : {vuln.line_number}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
